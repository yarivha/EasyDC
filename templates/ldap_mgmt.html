{% extends "base.html" %}
{% block title %}{{ section }} - {{ server.name }} - EasyDC{% endblock %}
{% block content %}

<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/"><i class="bi bi-house me-1"></i>Dashboard</a></li>
        <li class="breadcrumb-item"><a href="/servers/{{ server.id }}">{{ server.name }}</a></li>
        <li class="breadcrumb-item active">{{ section }}</li>
    </ol>
</nav>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">{{ section }}</h4>
</div>

<div class="alert alert-info">
    <i class="bi bi-info-circle me-1"></i>
    LDAP management for <strong>{{ server.name }}</strong> is coming in the next release.
</div>

{% endblock %}
