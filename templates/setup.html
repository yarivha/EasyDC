{% extends "base_public.html" %}
{% block title %}Setup - EasyDC{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="bi bi-hdd-network fs-1 text-primary"></i>
            <h3 class="fw-bold mt-2">EasyDC</h3>
            <p class="text-muted">Initial Setup</p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-3">Create Admin Account</h5>
                {% if error %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
                </div>
                {% endif %}
                <form method="post" action="/setup">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Password</label>
                        <input type="password" name="password" class="form-control" required minlength="8">
                        <div class="form-text">Minimum 8 characters</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-1"></i> Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
