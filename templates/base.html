<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EasyDC{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230d6efd'/><rect x='6' y='8' width='20' height='7' rx='2' fill='%23fff'/><rect x='6' y='17' width='20' height='7' rx='2' fill='%23fff'/><circle cx='10' cy='11.5' r='1.3' fill='%230d6efd'/><circle cx='10' cy='20.5' r='1.3' fill='%230d6efd'/></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .hover-card:hover { border-color: #0d6efd !important; box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15) !important; }
        .card { transition: all 0.2s ease; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-hdd-network me-1"></i> EasyDC
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/audit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-journal-text me-1"></i> Audit Log
                </a>
                <form method="post" action="/logout" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <div style="position:fixed;bottom:0.75rem;right:1rem;font-size:0.75rem;color:#6c757d;pointer-events:none;">
        v{{ app_version() }}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
